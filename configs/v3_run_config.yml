run:
  name: nt_mvt_v3_500m
  random_state: 42
  crs: EPSG:3577
  pixel_size_m: 500
  top_k_pcts: [1, 5, 10]

data_roles:
  label_column: label
  feature_columns:
    - carbonate_host
    - lithology_code
    - dist_faults
    - moho_depth
    - lab_depth
    - gravity
    - gravity_hgm
    - mag_rtp
    - mag_hgm
    - shape_index
  identifier_columns:
    - split_id
    - x
    - y
    - row
    - col
    - sample_role
  forbidden_feature_patterns:
    - "^x$"
    - "^y$"
    - "^row$"
    - "^col$"
    - "lon|lat|coord|easting|northing"

scaling:
  enabled: true
  method: standard
  with_mean: true
  with_std: true

model:
  type: random_forest
  n_estimators: 500
  min_samples_leaf: 2
  class_weight: balanced
  n_jobs: -1
